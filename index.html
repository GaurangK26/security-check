i<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Google Security Verification</title>

<style>
:root{
--green:#00ff9c;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:Consolas,monospace;
background:black;
color:var(--green);
overflow:hidden;
}

/* START SCREEN */

#start{
position:fixed;
inset:0;
background:black;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
color:white;
z-index:5;
}

#start button{
background:#00ff9c;
border:0;
padding:15px 26px;
border-radius:12px;
font-weight:bold;
font-size:18px;
cursor:pointer;
box-shadow:0 0 25px rgba(0,255,156,.5);
}

#start small{opacity:.7;margin-top:12px}

/* VOLUME POPUP */

#volumePopup{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:#111;
border:1px solid #444;
color:white;
padding:14px 18px;
border-radius:10px;
z-index:10;
display:none;
font-family:Arial;
box-shadow:0 0 20px rgba(0,0,0,.7);
}

/* TERMINAL */

#terminal{
white-space:pre-line;
font-size:17px;
padding:18px;
max-height:70vh;
overflow:auto;
text-shadow:0 0 6px rgba(0,255,156,.6);
}

.bar-wrap{padding:0 18px}
.bar{
width:0%;
height:12px;
background:linear-gradient(90deg,#00ff9c,#00ffa2,#7cffcb);
box-shadow:0 0 18px rgba(0,255,156,.8);
transition:width 1.1s;
}

/* FINAL PAGE */

#final{
display:none;
position:fixed;
inset:0;
overflow:auto;
font-family:Arial,Helvetica,sans-serif;
color:white;
}

/* background */

#bg{
position:fixed;
inset:0;
background:
radial-gradient(circle at 30% 30%,#2b0050,transparent 40%),
radial-gradient(circle at 70% 70%,#003c3c,transparent 40%),
linear-gradient(120deg,#000000,#050018,#001f2e);
z-index:0;
}

/* stars */

.star{
position:fixed;
width:3px;
height:3px;
background:white;
opacity:.7;
border-radius:50%;
animation:float 8s linear infinite;
}

@keyframes float{
from{transform:translateY(0)}
to{transform:translateY(-120vh)}
}

/* content */

#content{
position:relative;
z-index:2;
max-width:900px;
margin:0 auto;
padding:80px 20px;
text-align:center;
}

.hero{
font-size:70px;
margin:0;
background:linear-gradient(90deg,#ff7a18,#ff3cac,#ffd166,#7cffcb);
-webkit-background-clip:text;
color:transparent;
}

/* FIXED BLUE NAME */

#name{
color:#4da6ff;
font-weight:900;
text-shadow:
0 0 8px #4da6ff,
0 0 18px #4da6ff,
0 0 28px #4da6ff;
font-size:32px;
display:block;
margin-top:10px;
}

/* card */

.card{
background:rgba(255,255,255,.08);
border:1px solid rgba(255,255,255,.2);
backdrop-filter:blur(12px);
border-radius:22px;
padding:28px;
box-shadow:0 20px 70px rgba(0,0,0,.6);
}

.msg{
text-align:left;
line-height:1.7;
font-size:18px;
white-space:pre-line;
}

.badge{
margin-top:18px;
display:inline-block;
background:linear-gradient(90deg,#ffd166,#ff5fa2);
color:black;
font-weight:bold;
padding:10px 16px;
border-radius:999px;
font-size:18px;
}

/* balloons */

.balloon{
position:fixed;
bottom:-150px;
width:80px;
height:100px;
border-radius:50% 50% 45% 45%;
opacity:.95;
z-index:1;
}
.balloon:after{
content:"";
position:absolute;
bottom:-25px;
left:50%;
width:2px;
height:50px;
background:#ddd;
}

/* confetti */

#confetti{
position:fixed;
inset:0;
pointer-events:none;
z-index:1;
}

.flash{animation:flash .12s 8 alternate}
@keyframes flash{
from{background:white}
to{background:black}
}

</style>
</head>

<body>

<div id="start">
<button id="begin">Tap to Continue</button>
<small>Security verification required</small>
</div>

<div id="volumePopup">🔊 Increase volume — audio will play</div>

<div id="terminal"></div>
<div class="bar-wrap"><div class="bar" id="progress"></div></div>

<div id="final">
<div id="bg"></div>
<canvas id="confetti"></canvas>

<div id="content">
<h1 class="hero">HAPPY 15th BIRTHDAY</h1>
<span id="name"></span>

<div class="card">
<div class="msg" id="longmsg"></div>
<div class="badge">LEVEL 15 UNLOCKED</div>
</div>
</div>
</div>

<audio id="bgm" preload="auto" src="audio.mp3"></audio>

<script>

const ADDRESS="Shivam Apt., Near Thakur Mall, Dahisar (East)";
const COORDS="19.2625301, 72.8754486";

const params=new URLSearchParams(window.location.search);
const person=params.get('name')||"USER";
document.getElementById('name').textContent=person;

/* volume popup */

function showVolume(){
const p=document.getElementById("volumePopup");
p.style.display="block";
setTimeout(()=>p.style.display="none",5000);
}

/* audio */
const audio=document.getElementById('bgm');

/* MESSAGE */
document.getElementById('longmsg').textContent=
`Yo ${person},

You actually thought your phone got hacked, didn't you? 😭 🙏 

This whole thing was just so I could do something better than a boring WhatsApp "HBD".

You’re 15 now. Not a kid anymore but not fully adult either — basically the weird phase where life speeds up. School pressure, future plans, random chaos, late-night talks, stupid jokes… all of it somehow turns into memories.

Thanks for all the random conversations, pointless arguments, last-moment plans and dumb decisions that somehow worked out. Half the time nothing made sense but those are still the best moments.

I hope this year gives you better luck, easier exams, clutch game sessions, and unlimited snacks. May your WiFi stay fast, teachers stay absent, and alarms somehow stop existing.

No matter what happens next — studies, stress, future — just stay the same person. The world already has enough serious people.

Happy 15th birthday. I’m glad I got to be part of your life so far and I’m looking forward to many more years of goofy stuff together.

Now go cut the cake before someone else eats it.

- Your Friend
P. Diddy & Jeffrey Epstein`;

/* terminal */

const term=document.getElementById('terminal');
const progress=document.getElementById('progress');

function sleep(ms){return new Promise(r=>setTimeout(r,ms));}async function p(t){
term.innerHTML += t + "<br>";
term.scrollTop = term.scrollHeight;
await sleep(320);
}

async function sequence(){
await p("Initializing secure connection...");
await p("Bypassing firewall...");
await p("Acquiring device identifiers...");
await p("IMEI: "+Math.floor(1e14+Math.random()*9e14));
await p("MAC: "+Array.from({length:6},()=>Math.floor(Math.random()*256).toString(16).padStart(2,'0')).join(':'));
await p("Accessing contacts...");
await p("Scanning gallery...");
await p("Camera permission granted");
await p("Microphone active");
await p("Triangulating location...");
await p("Location: "+ADDRESS);
await p("Coordinates: "+COORDS);
await p("Uploading to remote server...");
progress.style.width="100%";
await sleep(1000);
reveal();
}

async function reveal(){
document.body.classList.add('flash');
await sleep(700);
document.getElementById('terminal').style.display="none";
document.querySelector('.bar-wrap').style.display="none";
document.getElementById('final').style.display="block";
spawnStars();
spawnBalloons();
launchConfetti();

showVolume();
audio.play().catch(()=>{});
}

document.getElementById('begin').onclick=async()=>{
try{await document.documentElement.requestFullscreen();}catch(e){}
document.getElementById('start').style.display="none";
await sleep(200);
sequence();
};

/* stars */
function spawnStars(){
for(let i=0;i<70;i++){
const s=document.createElement('div');
s.className='star';
s.style.left=Math.random()*100+'vw';
s.style.top=Math.random()*100+'vh';
s.style.animationDuration=(6+Math.random()*6)+'s';
document.body.appendChild(s);
}
}

/* balloons */
function spawnBalloons(){
const colors=['#ff5fa2','#ffd166','#7cffcb','#7aa2ff','#ff7a18'];
for(let i=0;i<12;i++){
const b=document.createElement('div');
b.className='balloon';
b.style.left=Math.random()*100+'vw';
b.style.background=colors[i%colors.length];
b.style.animation=`rise ${12+Math.random()*8}s linear infinite`;
document.body.appendChild(b);
}
const st=document.createElement('style');
st.textContent='@keyframes rise{0%{transform:translateY(0)}100%{transform:translateY(-130vh)}}';
document.head.appendChild(st);
}

/* confetti */
function launchConfetti(){
const c=document.getElementById('confetti');
const ctx=c.getContext('2d');
c.width=innerWidth;c.height=innerHeight;

const pieces=Array.from({length:180},()=>({
x:Math.random()*c.width,
y:-20-Math.random()*c.height,
r:4+Math.random()*6,
d:1+Math.random()*3,
c:`hsl(${Math.random()*360},90%,60%)`,
t:Math.random()*Math.PI*2
}));

function draw(){
ctx.clearRect(0,0,c.width,c.height);
for(const p of pieces){
p.y+=p.d;
p.x+=Math.sin(p.t+=0.03)*2;
ctx.fillStyle=p.c;
ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fill();
if(p.y>c.height){p.y=-10;p.x=Math.random()*c.width}
}
requestAnimationFrame(draw);
}
draw();
}

</script>

</body>
</html>
